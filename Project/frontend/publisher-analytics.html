<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publisher Analytics - CommonSource</title>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root { --red:#C0271F; --dark:#1A1A1A; --mid:#4A4A4A; --light:#8A8A8A; --rule:#E0DDD8; --bg:#F7F6F2; --white:#FFF; --serif:Georgia,'Times New Roman',serif; --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
body { font-family:var(--sans); background:var(--bg); color:var(--dark); min-height:100vh; }
header { background:var(--dark); border-bottom:3px solid var(--red); padding:0 24px; }
.header-inner { max-width:1040px; margin:0 auto; padding:22px 0; display:flex; justify-content:space-between; align-items:center; gap:18px; }
.logo { font-family:var(--serif); font-size:1.55rem; font-weight:700; color:var(--white); text-decoration:none; }
.logo span { color:var(--red); }
.nav { display:flex; gap:8px; flex-wrap:wrap; }
.nav a, .nav button { color:#CCC; background:transparent; border:1px solid #444; border-radius:4px; padding:7px 10px; font-size:.76rem; text-decoration:none; cursor:pointer; }
main { max-width:1040px; margin:0 auto; padding:32px 24px 72px; }
h1 { font-family:var(--serif); font-size:1.8rem; margin-bottom:8px; }
.intro { color:var(--mid); margin-bottom:22px; line-height:1.6; }
.status { min-height:22px; color:var(--light); font-size:.82rem; margin-bottom:14px; }
.status.error { color:var(--red); }
.grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:18px; }
.panel { background:var(--white); border:1px solid var(--rule); border-radius:4px; padding:18px; }
.panel.full { grid-column:1 / -1; }
.panel h2 { font-size:.82rem; letter-spacing:.09em; text-transform:uppercase; margin-bottom:14px; }
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.stat { border:1px solid var(--rule); border-radius:4px; padding:12px; }
.stat strong { display:block; font-family:var(--serif); font-size:1.55rem; }
.stat span { color:var(--light); font-size:.72rem; text-transform:uppercase; letter-spacing:.07em; }
.item { border-top:1px solid var(--rule); padding:10px 0; }
.item:first-child { border-top:0; padding-top:0; }
.item-title { font-family:var(--serif); font-weight:700; color:var(--dark); text-decoration:none; }
.item-meta { color:var(--light); font-size:.76rem; margin-top:4px; }
.empty { color:var(--light); font-size:.82rem; }
@media (max-width:760px) { .grid, .stats { grid-template-columns:1fr; } .panel.full { grid-column:auto; } .header-inner { flex-direction:column; align-items:flex-start; } }
</style>
<link rel="stylesheet" href="/theme.css">
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="/search">Common<span>Source</span></a>
    <div class="nav">
      <a href="/publisher/dashboard">Publisher Dashboard</a>
      <a href="/publisher/profile">Profile</a>
      <a href="/search">Archive</a>
      <button type="button" onclick="logoutUser()">Logout</button>
    </div>
  </div>
</header>
<main>
  <h1>Publisher Analytics</h1>
  <p class="intro">Track uploaded documents, search visibility, reading activity, and the categories your audience engages with.</p>
  <div class="status" id="status"></div>
  <section class="panel full"><h2>Overview</h2><div class="stats" id="stats"></div></section>
  <div class="grid">
    <section class="panel"><h2>Most Viewed Documents</h2><div id="most-viewed"></div></section>
    <section class="panel"><h2>Top Categories</h2><div id="top-categories"></div></section>
    <section class="panel"><h2>Top Tags</h2><div id="top-tags"></div></section>
    <section class="panel"><h2>Top Topics</h2><div id="top-topics"></div></section>
  </div>
</main>
<script>
const API = window.location.protocol === 'file:' ? 'http://localhost:5050' : '';
const ACCESS_TOKEN_KEY = 'cs_access_token';
const REFRESH_TOKEN_KEY = 'cs_refresh_token';
const USER_KEY = 'cs_user';
function escHtml(value) { return String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function getToken() { return localStorage.getItem(ACCESS_TOKEN_KEY) || ''; }
function clearAuthState() { localStorage.removeItem(ACCESS_TOKEN_KEY); localStorage.removeItem(REFRESH_TOKEN_KEY); localStorage.removeItem(USER_KEY); }
function setStatus(message, isError=false) { const el=document.getElementById('status'); el.textContent=message||''; el.classList.toggle('error', !!isError); }
async function fetchJson(path) {
  const token = getToken();
  if (!token) { window.location.href = '/login'; throw new Error('Login required'); }
  const res = await fetch(`${API}${path}`, { headers: { Authorization: `Bearer ${token}` } });
  const data = await res.json().catch(() => ({}));
  if (res.status === 401) { clearAuthState(); window.location.href = '/login'; }
  if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}
function renderDocs(items) {
  if (!items?.length) return '<div class="empty">No views recorded yet.</div>';
  return items.map(item => `<div class="item"><a class="item-title" href="/document/${encodeURIComponent(item.document_id)}">${escHtml(item.title)}</a><div class="item-meta">${escHtml(item.view_count || 0)} views</div></div>`).join('');
}
function renderCounts(items) {
  if (!items?.length) return '<div class="empty">No data yet.</div>';
  return items.map(item => `<div class="item"><div class="item-title">${escHtml(item.name)}</div><div class="item-meta">${escHtml(item.count)} documents</div></div>`).join('');
}
function logoutUser() { clearAuthState(); window.location.href = '/login'; }
async function loadAnalytics() {
  try {
    const data = await fetchJson('/api/publisher/analytics');
    document.getElementById('stats').innerHTML = `
      <div class="stat"><strong>${escHtml(data.documents_uploaded || data.article_count || 0)}</strong><span>Uploaded</span></div>
      <div class="stat"><strong>${escHtml(data.total_views || 0)}</strong><span>Total Views</span></div>
      <div class="stat"><strong>${escHtml(data.search_impressions || 0)}</strong><span>Impressions</span></div>
      <div class="stat"><strong>${escHtml(data.search_clicks || 0)}</strong><span>Clicks</span></div>`;
    document.getElementById('most-viewed').innerHTML = renderDocs(data.most_viewed_documents || []);
    document.getElementById('top-categories').innerHTML = renderCounts(data.top_categories || []);
    document.getElementById('top-tags').innerHTML = renderCounts(data.top_document_tags || data.top_tags || []);
    document.getElementById('top-topics').innerHTML = renderCounts(data.top_topics || []);
  } catch (err) {
    setStatus(err.message || 'Analytics failed', true);
  }
}
loadAnalytics();
</script>
</body>
</html>
