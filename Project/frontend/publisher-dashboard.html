<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publisher Dashboard - CommonSource</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red: #C0271F;
  --dark: #1A1A1A;
  --mid: #4A4A4A;
  --light: #8A8A8A;
  --rule: #E0DDD8;
  --bg: #F7F6F2;
  --white: #FFFFFF;
  --serif: Georgia, 'Times New Roman', serif;
  --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
body { font-family: var(--sans); background: var(--bg); color: var(--dark); min-height: 100vh; }
header { background: var(--dark); border-bottom: 3px solid var(--red); padding: 0 24px; }
.header-inner { max-width: 1040px; margin: 0 auto; padding: 22px 0; display: flex; justify-content: space-between; align-items: center; gap: 18px; }
.logo { font-family: var(--serif); font-size: 1.5rem; font-weight: 700; color: var(--white); text-decoration: none; }
.logo span { color: var(--red); }
.nav { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.nav a, .nav button { color: #CCC; background: transparent; border: 1px solid #444; border-radius: 4px; padding: 7px 10px; font-size: 0.76rem; text-decoration: none; cursor: pointer; }
.nav a:hover, .nav button:hover { border-color: #777; color: var(--white); }
main { max-width: 1040px; margin: 0 auto; padding: 30px 24px 72px; }
.intro { display: flex; justify-content: space-between; align-items: end; gap: 18px; margin-bottom: 20px; }
h1 { font-family: var(--serif); font-size: 1.65rem; margin-bottom: 8px; }
.muted { color: var(--mid); font-size: 0.86rem; line-height: 1.55; }
.status { min-height: 22px; color: var(--light); font-size: 0.8rem; margin-bottom: 14px; }
.status.error { color: var(--red); }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
.panel { background: var(--white); border: 1px solid var(--rule); border-radius: 4px; padding: 16px; }
.panel.full { grid-column: 1 / -1; }
.panel h2 { font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
.metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
.metric { border: 1px solid var(--rule); border-radius: 4px; padding: 12px; background: var(--bg); }
.metric-value { font-family: var(--serif); font-size: 1.45rem; }
.metric-label { color: var(--light); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }
.row { border-bottom: 1px solid var(--rule); padding: 9px 0; font-size: 0.84rem; }
.row:last-child { border-bottom: 0; }
.row strong { display: block; margin-bottom: 3px; }
.chips { display: flex; gap: 7px; flex-wrap: wrap; }
.chip { border: 1px solid var(--rule); border-radius: 999px; padding: 5px 9px; font-size: 0.76rem; background: var(--bg); }
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--light); }
.input { width: 100%; font-family: var(--sans); font-size: 0.86rem; padding: 9px 10px; border: 1px solid var(--rule); border-radius: 4px; background: var(--bg); color: var(--dark); outline: none; }
.input:focus { border-color: var(--red); background: var(--white); }
.btn { font-family: var(--sans); font-size: 0.76rem; font-weight: 700; padding: 8px 11px; background: var(--red); color: var(--white); border: none; border-radius: 4px; cursor: pointer; }
.btn.secondary { background: var(--white); color: var(--mid); border: 1px solid var(--rule); }
.btn:disabled { background: #CCC; cursor: wait; }
.feed-row { display: grid; grid-template-columns: 1fr 1.5fr 120px auto auto; gap: 8px; align-items: center; border-bottom: 1px solid var(--rule); padding: 9px 0; }
.empty { color: var(--light); font-size: 0.82rem; padding: 10px 0; }
@media (max-width: 820px) {
  .grid, .metrics { grid-template-columns: 1fr; }
  .intro { display: block; }
  .feed-row { grid-template-columns: 1fr; }
}
</style>
<link rel="stylesheet" href="/theme.css">
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="/search">Common<span>Source</span></a>
    <div class="nav">
      <a href="/search">Archive</a>
      <a href="/publisher/profile">Profile</a>
      <a href="/publisher/analytics">Analytics</a>
      <button type="button" onclick="logoutUser()">Logout</button>
    </div>
  </div>
</header>
<main>
  <section class="intro">
    <div>
      <h1>Publisher Dashboard</h1>
      <p class="muted" id="publisher-subtitle">Loading publisher workspace...</p>
    </div>
  </section>
  <div class="status" id="status" role="status"></div>

  <section class="metrics" id="metrics"></section>

  <div class="grid" style="margin-top:16px">
    <section class="panel">
      <h2>Profile</h2>
      <div id="profile-box"><div class="empty">Loading...</div></div>
    </section>
    <section class="panel">
      <h2>Top Topics & Tags</h2>
      <div id="topics-box"><div class="empty">Loading...</div></div>
    </section>

    <section class="panel full">
      <h2>Feeds</h2>
      <form id="feed-form" style="margin-bottom:12px">
        <div class="grid">
          <div class="field">
            <label for="feed_name">Feed name</label>
            <input class="input" id="feed_name" placeholder="Local news RSS">
          </div>
          <div class="field">
            <label for="feed_url">Feed URL</label>
            <input class="input" id="feed_url" placeholder="https://example.org/feed.xml" required>
          </div>
        </div>
        <button class="btn" id="add-feed" type="submit">Add feed</button>
      </form>
      <div id="feeds-box"><div class="empty">Loading feeds...</div></div>
    </section>

    <section class="panel">
      <h2>Article Upload</h2>
      <form id="upload-form">
        <div class="field">
          <label for="upload-file">File</label>
          <input class="input" id="upload-file" name="file" type="file" accept=".txt,.pdf,.docx" required>
        </div>
        <div class="field">
          <label for="upload-theme">Topic</label>
          <input class="input" id="upload-theme" name="theme" placeholder="health, climate">
        </div>
        <button class="btn" id="upload-btn" type="submit">Upload article</button>
      </form>
    </section>

    <section class="panel">
      <h2>Recent Activity</h2>
      <div id="activity-box"><div class="empty">Loading...</div></div>
    </section>

    <section class="panel full">
      <h2>Recent Uploads</h2>
      <div id="uploads-box"><div class="empty">Loading...</div></div>
    </section>
  </div>
</main>

<script>
const API = window.location.protocol === 'file:' ? 'http://localhost:5050' : '';
const ACCESS_TOKEN_KEY = 'cs_access_token';
const REFRESH_TOKEN_KEY = 'cs_refresh_token';
const USER_KEY = 'cs_user';
let csrfToken = '';
let currentPublisher = null;

function escHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
function getToken() { return localStorage.getItem(ACCESS_TOKEN_KEY) || ''; }
function clearAuthState() {
  localStorage.removeItem(ACCESS_TOKEN_KEY);
  localStorage.removeItem(REFRESH_TOKEN_KEY);
  localStorage.removeItem(USER_KEY);
  csrfToken = '';
}
function setStatus(message, isError = false) {
  const el = document.getElementById('status');
  el.textContent = message || '';
  el.classList.toggle('error', !!isError);
}
async function getCsrfToken() {
  if (csrfToken) return csrfToken;
  const res = await fetch(`${API}/api/auth/csrf`, { headers: { Authorization: `Bearer ${getToken()}` } });
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
  csrfToken = data.csrf_token || '';
  return csrfToken;
}
async function fetchJson(path, options = {}) {
  const token = getToken();
  if (!token) {
    window.location.href = '/login';
    throw new Error('Login required');
  }
  const method = (options.method || 'GET').toUpperCase();
  const headers = { ...(options.headers || {}), Authorization: `Bearer ${token}` };
  if (['POST', 'PUT', 'PATCH', 'DELETE'].includes(method)) headers['X-CSRF-Token'] = await getCsrfToken();
  const res = await fetch(`${API}${path}`, { ...options, headers });
  const data = await res.json().catch(() => ({}));
  if (res.status === 401) {
    clearAuthState();
    window.location.href = '/login';
  }
  if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}
async function logoutUser() {
  try {
    await fetch(`${API}/api/auth/logout`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...(getToken() ? { Authorization: `Bearer ${getToken()}` } : {}) },
      body: JSON.stringify({ refresh_token: localStorage.getItem(REFRESH_TOKEN_KEY) || '' })
    });
  } finally {
    clearAuthState();
    window.location.href = '/login';
  }
}
function renderDashboard(data) {
  currentPublisher = data.publisher;
  document.getElementById('publisher-subtitle').textContent = `${data.publisher.name} Â· ${data.verification_status}`;
  document.getElementById('metrics').innerHTML = [
    ['Feeds', data.feed_count],
    ['Articles', data.article_count],
    ['Topics', data.top_topics.length],
    ['Tags', data.top_tags.length]
  ].map(([label, value]) => `
    <div class="metric"><div class="metric-value">${escHtml(value)}</div><div class="metric-label">${escHtml(label)}</div></div>
  `).join('');
  const profile = data.profile || {};
  document.getElementById('profile-box').innerHTML = `
    <div class="row"><strong>${escHtml(profile.organization_name || data.publisher.name)}</strong><span class="muted">${escHtml(profile.description || 'No description yet.')}</span></div>
    <div class="row"><strong>Status</strong>${escHtml(data.verification_status)}</div>
    <div class="row"><strong>Website</strong>${profile.website ? `<a href="${escHtml(profile.website)}" target="_blank" rel="noopener">${escHtml(profile.website)}</a>` : 'Not set'}</div>
    <div class="row"><strong>Coverage</strong>${escHtml(profile.coverage_regions || data.publisher.geography || 'Not set')}</div>
  `;
  const chips = [
    ...data.top_topics.map(t => ({ name: t.name, count: t.count })),
    ...data.top_tags.map(t => ({ name: t.name, count: t.count }))
  ];
  document.getElementById('topics-box').innerHTML = chips.length
    ? `<div class="chips">${chips.map(t => `<span class="chip">${escHtml(t.name)} (${escHtml(t.count)})</span>`).join('')}</div>`
    : '<div class="empty">No topics or tags yet.</div>';
  document.getElementById('activity-box').innerHTML = data.recent_activity.length
    ? data.recent_activity.map(item => `<div class="row"><strong>${escHtml(item.action)}</strong><span class="muted">${escHtml(item.timestamp)}</span></div>`).join('')
    : '<div class="empty">No activity yet.</div>';
  document.getElementById('uploads-box').innerHTML = data.recent_uploads.length
    ? data.recent_uploads.map(item => `<div class="row"><strong>${escHtml(item.article_title || item.asset_id)}</strong><span class="muted">${escHtml(item.source_origin || item.source_type)} Â· ${escHtml(item.created_at)}</span></div>`).join('')
    : '<div class="empty">No articles uploaded yet.</div>';
}
function renderFeeds(feeds) {
  document.getElementById('feeds-box').innerHTML = feeds.length ? feeds.map(feed => `
    <div class="feed-row" data-feed-id="${escHtml(feed.id)}">
      <input class="input feed-name" value="${escHtml(feed.feed_name)}">
      <input class="input feed-url" value="${escHtml(feed.feed_url)}">
      <select class="input feed-status">
        ${['active','paused','disabled','error'].map(status => `<option value="${status}" ${feed.status === status ? 'selected' : ''}>${status}</option>`).join('')}
      </select>
      <button class="btn secondary" type="button" onclick="saveFeed('${escHtml(feed.id)}')">Save</button>
      <button class="btn secondary" type="button" onclick="deleteFeed('${escHtml(feed.id)}')">Delete</button>
    </div>
  `).join('') : '<div class="empty">No feeds yet.</div>';
}
async function loadDashboard() {
  setStatus('Loading dashboard...');
  try {
    const data = await fetchJson('/api/publisher/dashboard');
    renderDashboard(data);
    const feedData = await fetchJson(`/api/feeds?publisher_id=${encodeURIComponent(data.publisher.id)}`);
    renderFeeds(feedData.feeds || []);
    setStatus('');
  } catch (err) {
    setStatus(err.message || 'Could not load dashboard.', true);
  }
}
document.getElementById('feed-form').addEventListener('submit', async event => {
  event.preventDefault();
  if (!currentPublisher) return;
  const btn = document.getElementById('add-feed');
  btn.disabled = true;
  setStatus('Adding feed...');
  try {
    await fetchJson('/api/feed/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        publisher_id: currentPublisher.id,
        feed_name: document.getElementById('feed_name').value.trim(),
        feed_url: document.getElementById('feed_url').value.trim()
      })
    });
    event.target.reset();
    await loadDashboard();
    setStatus('Feed added.');
  } catch (err) {
    setStatus(err.message || 'Could not add feed.', true);
  } finally {
    btn.disabled = false;
  }
});
async function saveFeed(feedId) {
  const row = document.querySelector(`[data-feed-id="${CSS.escape(feedId)}"]`);
  setStatus('Saving feed...');
  try {
    await fetchJson(`/api/feeds/${encodeURIComponent(feedId)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        feed_name: row.querySelector('.feed-name').value.trim(),
        feed_url: row.querySelector('.feed-url').value.trim(),
        status: row.querySelector('.feed-status').value
      })
    });
    await loadDashboard();
    setStatus('Feed saved.');
  } catch (err) {
    setStatus(err.message || 'Could not save feed.', true);
  }
}
async function deleteFeed(feedId) {
  setStatus('Deleting feed...');
  try {
    await fetchJson(`/api/feeds/${encodeURIComponent(feedId)}`, { method: 'DELETE' });
    await loadDashboard();
    setStatus('Feed deleted.');
  } catch (err) {
    setStatus(err.message || 'Could not delete feed.', true);
  }
}
document.getElementById('upload-form').addEventListener('submit', async event => {
  event.preventDefault();
  if (!currentPublisher) return;
  const btn = document.getElementById('upload-btn');
  btn.disabled = true;
  setStatus('Uploading article...');
  try {
    const form = new FormData(event.target);
    form.append('publisher_id', currentPublisher.id);
    const res = await fetch(`${API}/api/ingest/upload`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${getToken()}`, 'X-CSRF-Token': await getCsrfToken() },
      body: form
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
    event.target.reset();
    await loadDashboard();
    setStatus('Article uploaded.');
  } catch (err) {
    setStatus(err.message || 'Could not upload article.', true);
  } finally {
    btn.disabled = false;
  }
});
document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
