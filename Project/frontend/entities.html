<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entity Explorer - CommonSource</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --red:#C0271F; --dark:#1A1A1A; --mid:#4A4A4A; --light:#8A8A8A; --rule:#E0DDD8; --bg:#F7F6F2; --white:#FFFFFF; --serif:Georgia,'Times New Roman',serif; --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
body { font-family: var(--sans); background: var(--bg); color: var(--dark); min-height: 100vh; }
header { background: var(--dark); border-bottom: 3px solid var(--red); padding: 0 24px; }
.header-inner { max-width: 1120px; margin: 0 auto; padding: 22px 0; display: flex; justify-content: space-between; align-items: center; gap: 14px; }
.logo { font-family: var(--serif); font-size: 1.5rem; font-weight: 700; color: var(--white); text-decoration: none; }
.logo span { color: var(--red); }
.nav { display: flex; gap: 8px; flex-wrap: wrap; }
.nav a, .nav button { color: #CCC; background: transparent; border: 1px solid #444; border-radius: 4px; padding: 7px 10px; font-size: 0.76rem; text-decoration: none; cursor: pointer; }
main { max-width: 1120px; margin: 0 auto; padding: 32px 24px 72px; }
h1 { font-family: var(--serif); font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 8px; }
.muted { color: var(--mid); font-size: 0.9rem; line-height: 1.65; max-width: 760px; }
.toolbar { display: grid; grid-template-columns: minmax(0,1fr) 190px 190px 150px; gap: 10px; margin: 24px 0 18px; }
.input { border: 1px solid var(--rule); border-radius: 4px; background: var(--white); color: var(--dark); font: inherit; padding: 11px 12px; min-width: 0; }
.btn { border: 0; border-radius: 4px; background: var(--red); color: var(--white); cursor: pointer; font-weight: 800; padding: 11px 14px; }
.status { color: var(--light); font-size: 0.82rem; min-height: 20px; margin-bottom: 14px; }
.status.error { color: var(--red); }
.list { display: flex; flex-direction: column; gap: 10px; }
.item { background: var(--white); border: 1px solid var(--rule); border-radius: 6px; display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 18px; padding: 16px; }
.item h2 { font-family: var(--serif); font-size: 1.18rem; margin-bottom: 8px; }
.item h2 a { color: var(--dark); text-decoration: none; }
.item h2 a:hover { color: var(--red); }
.badge { display: inline-block; border: 1px solid var(--rule); border-radius: 999px; color: var(--mid); font-size: .72rem; font-weight: 800; letter-spacing: .04em; padding: 4px 8px; text-transform: uppercase; }
.numbers { display: flex; gap: 8px; align-items: stretch; }
.metric { background: var(--bg); border: 1px solid var(--rule); border-radius: 4px; min-width: 98px; padding: 10px; text-align: center; }
.metric strong { display: block; font-family: var(--serif); font-size: 1.2rem; }
.metric span { color: var(--light); font-size: .68rem; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { display: inline-block; border: 1px solid var(--rule); border-radius: 999px; padding: 5px 9px; font-size: 0.76rem; background: var(--bg); text-decoration:none; color:var(--dark); }
.chip:hover { border-color: var(--red); color: var(--red); }
.empty { color: var(--light); font-size: .9rem; padding: 24px 0; }
@media (max-width: 900px) { .header-inner { align-items: flex-start; flex-direction: column; } .toolbar, .item { grid-template-columns: 1fr; } .numbers { flex-wrap: wrap; } }
</style>
<link rel="stylesheet" href="/theme.css">
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="/">Common<span>Source</span></a>
    <nav class="nav" data-role-nav></nav>
  </div>
</header>
<main>
  <h1>Entity Explorer</h1>
  <p class="muted">Explore extracted entities across diseases, organizations, programmes, campaigns, locations, people, and topics.</p>
  <form class="toolbar" id="filters">
    <input class="input" id="query" placeholder="Search entities, e.g. COVID-19, WHO, Bihar">
    <select class="input" id="type">
      <option value="">All entity types</option>
      <option>Disease</option>
      <option>Organization</option>
      <option>Program</option>
      <option>Campaign</option>
      <option>Location</option>
      <option>Person</option>
      <option>Topic</option>
    </select>
    <select class="input" id="sort">
      <option value="mentions">Most mentions</option>
      <option value="documents">Most documents</option>
      <option value="name">Name</option>
    </select>
    <button class="btn" type="submit">Apply</button>
  </form>
  <div class="status" id="status"></div>
  <div class="list" id="entities"><div class="empty">Loading entities...</div></div>
</main>
<script src="/common-nav.js"></script>
<script>
const API = window.location.protocol === 'file:' ? 'http://localhost:5050' : '';

function escHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[c]));
}

function fmt(value) {
  const number = Number(value || 0);
  return Number.isFinite(number) ? number.toLocaleString() : '0';
}

function setStatus(message, isError = false) {
  const el = document.getElementById('status');
  el.textContent = message || '';
  el.classList.toggle('error', Boolean(isError));
}

function entityRow(entity) {
  const topics = entity.related_topics || [];
  return `<article class="item">
    <div>
      <h2><a href="/entity/${encodeURIComponent(entity.id)}">${escHtml(entity.name)}</a></h2>
      <span class="badge">${escHtml(entity.entity_type || 'Entity')}</span>
      <div class="chips" style="margin-top:10px">
        ${topics.length ? topics.map(topic => `<a class="chip" href="/topic/${encodeURIComponent(topic.slug || topic.name)}">${escHtml(topic.name)}</a>`).join('') : '<span class="chip">No related topics yet</span>'}
      </div>
    </div>
    <div class="numbers">
      <div class="metric"><strong>${fmt(entity.mention_count)}</strong><span>Mentions</span></div>
      <div class="metric"><strong>${fmt(entity.document_count)}</strong><span>Documents</span></div>
    </div>
  </article>`;
}

async function loadEntities() {
  const params = new URLSearchParams({
    q: document.getElementById('query').value.trim(),
    type: document.getElementById('type').value,
    sort: document.getElementById('sort').value,
    limit: '80'
  });
  setStatus('Loading entities...');
  try {
    const res = await fetch(`${API}/api/entities/explore?${params.toString()}`);
    const data = await res.json().catch(() => ({}));
    if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
    document.getElementById('entities').innerHTML = data.entities?.length
      ? data.entities.map(entityRow).join('')
      : '<div class="empty">No entities match your filters.</div>';
    setStatus(`${fmt(data.count)} entity/entities`);
  } catch (err) {
    setStatus(err.message || 'Could not load entities.', true);
  }
}

document.getElementById('filters').addEventListener('submit', event => {
  event.preventDefault();
  loadEntities();
});

loadEntities();
</script>
</body>
</html>
