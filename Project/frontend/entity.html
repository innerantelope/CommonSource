<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entity - CommonSource</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --red:#C0271F; --dark:#1A1A1A; --mid:#4A4A4A; --light:#8A8A8A; --rule:#E0DDD8; --bg:#F7F6F2; --white:#FFFFFF; --serif:Georgia,'Times New Roman',serif; --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
body { font-family: var(--sans); background: var(--bg); color: var(--dark); min-height: 100vh; }
header { background: var(--dark); border-bottom: 3px solid var(--red); padding: 0 24px; }
.header-inner { max-width: 1080px; margin: 0 auto; padding: 22px 0; display: flex; justify-content: space-between; align-items: center; gap: 14px; }
.logo { font-family: var(--serif); font-size: 1.5rem; font-weight: 700; color: var(--white); text-decoration: none; }
.logo span { color: var(--red); }
.nav { display: flex; gap: 8px; flex-wrap: wrap; }
.nav a, .nav button { color: #CCC; background: transparent; border: 1px solid #444; border-radius: 4px; padding: 7px 10px; font-size: 0.76rem; text-decoration: none; cursor: pointer; }
main { max-width: 1080px; margin: 0 auto; padding: 32px 24px 72px; }
h1 { font-family: var(--serif); font-size: clamp(1.9rem, 4vw, 3rem); margin-bottom: 8px; }
.muted { color: var(--mid); font-size: 0.88rem; line-height: 1.6; }
.status { min-height: 22px; color: var(--light); font-size: 0.8rem; margin: 14px 0; }
.status.error { color: var(--red); }
.grid { display: grid; grid-template-columns: minmax(0, 2fr) 320px; gap: 16px; align-items: start; }
.panel { background: var(--white); border: 1px solid var(--rule); border-radius: 4px; padding: 16px; }
.panel + .panel { margin-top: 16px; }
.panel h2 { font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
.stat-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; margin: 18px 0; }
.stat { background: var(--white); border: 1px solid var(--rule); border-radius: 4px; padding: 12px; }
.stat strong { display: block; font-family: var(--serif); font-size: 1.4rem; }
.stat span { color: var(--light); font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; }
.item { border-bottom: 1px solid var(--rule); padding: 14px 0; }
.item:last-child { border-bottom: 0; }
.item a { color: var(--dark); text-decoration: none; font-weight: 800; font-family: var(--serif); font-size: 1.08rem; }
.item a:hover { color: var(--red); }
.chip { display: inline-block; border: 1px solid var(--rule); border-radius: 999px; padding: 5px 9px; font-size: 0.76rem; background: var(--bg); margin: 0 6px 6px 0; text-decoration:none; color:var(--dark); }
.chip:hover { border-color: var(--red); color: var(--red); }
.empty { color: var(--light); font-size: 0.84rem; padding: 12px 0; }
.timeline { display: flex; align-items: flex-end; gap: 4px; min-height: 92px; border-top: 1px solid var(--rule); padding-top: 14px; overflow-x: auto; }
.bar-wrap { min-width: 34px; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 5px; }
.bar { width: 100%; min-height: 3px; background: #D8D3CC; border-radius: 3px 3px 0 0; }
.bar-label { color: var(--light); font-size: 0.62rem; writing-mode: vertical-rl; transform: rotate(180deg); }
.bar-count { color: var(--mid); font-size: 0.68rem; font-weight: 700; }
@media (max-width: 820px) {
  header { padding: 0 18px; }
  .header-inner { align-items: flex-start; flex-direction: column; }
  main { padding: 22px 16px 52px; }
  .grid, .stat-grid { grid-template-columns: 1fr; }
}
</style>
<link rel="stylesheet" href="/theme.css">
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="/search">Common<span>Source</span></a>
    <nav class="nav" data-role-nav></nav>
  </div>
</header>
<main>
  <h1 id="title">Entity</h1>
  <p class="muted" id="subtitle">Loading entity...</p>
  <div class="stat-grid">
    <div class="stat"><strong id="doc-count">-</strong><span>Documents</span></div>
    <div class="stat"><strong id="publisher-count">-</strong><span>Publishers</span></div>
    <div class="stat"><strong id="related-count">-</strong><span>Related Entities</span></div>
  </div>
  <div class="status" id="status"></div>
  <div class="grid">
    <section>
      <div class="panel">
        <h2>Related Documents</h2>
        <div id="documents"><div class="empty">Loading...</div></div>
      </div>
      <div class="panel">
        <h2>Timeline Mentions</h2>
        <div id="timeline"><div class="empty">Loading...</div></div>
      </div>
    </section>
    <aside>
      <section class="panel">
        <h2>Related Entities</h2>
        <div id="related"></div>
      </section>
      <section class="panel">
        <h2>Related Topics</h2>
        <div id="topics"></div>
      </section>
      <section class="panel">
        <h2>Publishers</h2>
        <div id="publishers"></div>
      </section>
    </aside>
  </div>
</main>
<script src="/common-nav.js"></script>
<script>
const API = window.location.protocol === 'file:' ? 'http://localhost:5050' : '';

function escHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[c]));
}

function setStatus(message, isError = false) {
  const el = document.getElementById('status');
  el.textContent = message || '';
  el.classList.toggle('error', Boolean(isError));
}

function chipList(items, mapper) {
  if (!items?.length) return '<div class="empty">No data yet.</div>';
  return items.map(mapper).join('');
}

function documentHtml(item) {
  const documentId = item.document_id || item.asset_id || '';
  const meta = [item.publication, item.category, item.document_type, item.language].filter(Boolean).join(' - ');
  return `<article class="item">
    <a href="/document/${encodeURIComponent(documentId)}">${escHtml(item.title || documentId || 'Untitled')}</a>
    <p class="muted">${escHtml(meta)}</p>
    <p class="muted">${escHtml(item.excerpt || '')}</p>
  </article>`;
}

function timelineHtml(points) {
  if (!points?.length) return '<div class="empty">No timeline data yet.</div>';
  const max = Math.max(...points.map(point => point.mentions || point.document_count || 1), 1);
  return `<div class="timeline">${points.map(point => {
    const count = point.mentions || point.document_count || 0;
    const height = Math.max(4, Math.round((count / max) * 72));
    return `<div class="bar-wrap" title="${escHtml(point.period)}: ${escHtml(count)}">
      <span class="bar-count">${escHtml(count)}</span>
      <div class="bar" style="height:${height}px"></div>
      <span class="bar-label">${escHtml(point.period)}</span>
    </div>`;
  }).join('')}</div>`;
}

async function getJson(path) {
  const res = await fetch(`${API}${path}`);
  const data = await res.json().catch(() => ({}));
  if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

async function load() {
  const id = decodeURIComponent(location.pathname.replace(/^\/entity\//, ''));
  setStatus('Loading entity...');
  try {
    const detail = await getJson(`/api/entity/${encodeURIComponent(id)}`);
    const entity = detail.entity || {};
    const documents = detail.related_documents || detail.documents || [];
    document.title = `${entity.name || 'Entity'} - CommonSource`;
    document.getElementById('title').textContent = entity.name || 'Entity';
    document.getElementById('subtitle').textContent = `${entity.entity_type || 'Entity'} - ${detail.article_count || 0} mention(s)`;
    document.getElementById('doc-count').textContent = detail.document_count || documents.length || 0;
    document.getElementById('publisher-count').textContent = (detail.publishers || []).length;
    document.getElementById('related-count').textContent = (detail.related_entities || []).length;
    document.getElementById('documents').innerHTML = documents.length ? documents.map(documentHtml).join('') : '<div class="empty">No related documents.</div>';
    document.getElementById('related').innerHTML = chipList(detail.related_entities || [], item => `<a class="chip" href="/entity/${encodeURIComponent(item.id || item.slug || item.name)}">${escHtml(item.name)}${item.entity_type ? ` - ${escHtml(item.entity_type)}` : ''}</a>`);
    document.getElementById('topics').innerHTML = chipList(detail.related_topics || [], item => `<a class="chip" href="/topic/${encodeURIComponent(item.slug || item.name)}">${escHtml(item.name)}</a>`);
    document.getElementById('publishers').innerHTML = chipList(detail.publishers || [], item => `<span class="chip">${escHtml(item.publication)} (${escHtml(item.article_count || item.count || 0)})</span>`);
    document.getElementById('timeline').innerHTML = timelineHtml(detail.timeline_mentions || []);
    setStatus('');
  } catch (err) {
    setStatus(err.message || 'Could not load entity.', true);
  }
}

document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
