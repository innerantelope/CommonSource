<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topic Explorer - CommonSource</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --red:#C0271F; --dark:#1A1A1A; --mid:#4A4A4A; --light:#8A8A8A; --rule:#E0DDD8; --bg:#F7F6F2; --white:#FFFFFF; --serif:Georgia,'Times New Roman',serif; --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
body { font-family: var(--sans); background: var(--bg); color: var(--dark); min-height: 100vh; }
header { background: var(--dark); border-bottom: 3px solid var(--red); padding: 0 24px; }
.header-inner { max-width: 1120px; margin: 0 auto; padding: 22px 0; display: flex; justify-content: space-between; align-items: center; gap: 14px; }
.logo { font-family: var(--serif); font-size: 1.5rem; font-weight: 700; color: var(--white); text-decoration: none; }
.logo span { color: var(--red); }
.nav { display: flex; gap: 8px; flex-wrap: wrap; }
.nav a, .nav button { color: #CCC; background: transparent; border: 1px solid #444; border-radius: 4px; padding: 7px 10px; font-size: 0.76rem; text-decoration: none; cursor: pointer; }
main { max-width: 1120px; margin: 0 auto; padding: 32px 24px 72px; }
h1 { font-family: var(--serif); font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 8px; }
.muted { color: var(--mid); font-size: 0.9rem; line-height: 1.65; max-width: 760px; }
.toolbar { display: grid; grid-template-columns: minmax(0,1fr) 220px 160px; gap: 10px; margin: 24px 0 18px; }
.input { border: 1px solid var(--rule); border-radius: 4px; background: var(--white); color: var(--dark); font: inherit; padding: 11px 12px; min-width: 0; }
.btn { border: 0; border-radius: 4px; background: var(--red); color: var(--white); cursor: pointer; font-weight: 800; padding: 11px 14px; }
.status { color: var(--light); font-size: 0.82rem; min-height: 20px; margin-bottom: 14px; }
.status.error { color: var(--red); }
.grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; }
.card { background: var(--white); border: 1px solid var(--rule); border-radius: 6px; color: inherit; display: block; padding: 18px; text-decoration: none; }
.card:hover { border-color: var(--red); }
.card h2 { font-family: var(--serif); font-size: 1.25rem; line-height: 1.25; margin-bottom: 12px; }
.metric-row { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; }
.metric { background: var(--bg); border: 1px solid var(--rule); border-radius: 4px; padding: 10px; }
.metric strong { display: block; font-family: var(--serif); font-size: 1.2rem; }
.metric span { color: var(--light); font-size: .68rem; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; }
.empty { color: var(--light); font-size: .9rem; padding: 24px 0; }
@media (max-width: 840px) { .header-inner { align-items: flex-start; flex-direction: column; } .toolbar, .grid { grid-template-columns: 1fr; } }
</style>
<link rel="stylesheet" href="/theme.css">
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="/">Common<span>Source</span></a>
    <nav class="nav" data-role-nav></nav>
  </div>
</header>
<main>
  <h1>Topic Explorer</h1>
  <p class="muted">Browse major topics across the corpus by document count, related entity density, and current trending score.</p>
  <form class="toolbar" id="filters">
    <input class="input" id="query" placeholder="Search topics, e.g. dengue, nutrition, family planning">
    <select class="input" id="sort">
      <option value="documents">Most documents</option>
      <option value="relationships">Most relationships</option>
      <option value="trending">Trending</option>
    </select>
    <button class="btn" type="submit">Apply</button>
  </form>
  <div class="status" id="status"></div>
  <div class="grid" id="topics"><div class="empty">Loading topics...</div></div>
</main>
<script src="/common-nav.js"></script>
<script>
const API = window.location.protocol === 'file:' ? 'http://localhost:5050' : '';

function escHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[c]));
}

function fmt(value) {
  const number = Number(value || 0);
  return Number.isFinite(number) ? number.toLocaleString() : '0';
}

function setStatus(message, isError = false) {
  const el = document.getElementById('status');
  el.textContent = message || '';
  el.classList.toggle('error', Boolean(isError));
}

function topicCard(topic) {
  return `<a class="card" href="/topic/${encodeURIComponent(topic.slug || topic.name)}">
    <h2>${escHtml(topic.name)}</h2>
    <div class="metric-row">
      <div class="metric"><strong>${fmt(topic.document_count)}</strong><span>Documents</span></div>
      <div class="metric"><strong>${fmt(topic.related_entity_count)}</strong><span>Entities</span></div>
      <div class="metric"><strong>${fmt(topic.trending_score)}</strong><span>Score</span></div>
    </div>
  </a>`;
}

async function loadTopics() {
  const params = new URLSearchParams({
    q: document.getElementById('query').value.trim(),
    sort: document.getElementById('sort').value,
    limit: '90'
  });
  setStatus('Loading topics...');
  try {
    const res = await fetch(`${API}/api/topics?${params.toString()}`);
    const data = await res.json().catch(() => ({}));
    if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
    document.getElementById('topics').innerHTML = data.topics?.length
      ? data.topics.map(topicCard).join('')
      : '<div class="empty">No topics match your filters.</div>';
    setStatus(`${fmt(data.count)} topic(s)`);
  } catch (err) {
    setStatus(err.message || 'Could not load topics.', true);
  }
}

document.getElementById('filters').addEventListener('submit', event => {
  event.preventDefault();
  loadTopics();
});

loadTopics();
</script>
</body>
</html>
