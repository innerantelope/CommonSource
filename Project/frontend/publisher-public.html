<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publisher - CommonSource</title>
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root { --red:#C0271F; --dark:#1A1A1A; --mid:#4A4A4A; --light:#8A8A8A; --rule:#E0DDD8; --bg:#F7F6F2; --white:#FFF; --serif:Georgia,'Times New Roman',serif; --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
body { font-family:var(--sans); background:var(--bg); color:var(--dark); min-height:100vh; }
header { background:var(--dark); border-bottom:3px solid var(--red); padding:0 24px; }
.header-inner { max-width:920px; margin:0 auto; padding:22px 0; display:flex; justify-content:space-between; align-items:center; }
.logo { font-family:var(--serif); font-size:1.55rem; color:var(--white); font-weight:700; text-decoration:none; }
.logo span { color:var(--red); }
.nav a { color:#CCC; border:1px solid #444; border-radius:4px; padding:7px 10px; font-size:.76rem; text-decoration:none; }
main { max-width:920px; margin:0 auto; padding:32px 24px 72px; }
.profile { background:var(--white); border:1px solid var(--rule); border-radius:4px; padding:24px; margin-bottom:18px; }
.eyebrow { color:var(--red); font-size:.74rem; font-weight:800; letter-spacing:.12em; text-transform:uppercase; margin-bottom:8px; }
h1 { font-family:var(--serif); font-size:2rem; line-height:1.2; margin-bottom:10px; }
.description { color:var(--mid); line-height:1.7; margin-bottom:16px; }
.meta { display:flex; gap:8px; flex-wrap:wrap; }
.pill { border:1px solid var(--rule); border-radius:999px; padding:5px 10px; color:var(--mid); font-size:.76rem; font-weight:700; text-transform:uppercase; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.panel { background:var(--white); border:1px solid var(--rule); border-radius:4px; padding:18px; }
.panel.full { grid-column:1 / -1; }
.panel h2 { font-size:.82rem; letter-spacing:.09em; text-transform:uppercase; margin-bottom:14px; }
.stat strong { display:block; font-family:var(--serif); font-size:1.5rem; }
.stat span { color:var(--light); font-size:.74rem; text-transform:uppercase; letter-spacing:.07em; }
.item { border-top:1px solid var(--rule); padding:11px 0; }
.item:first-child { border-top:0; padding-top:0; }
.item-title { font-family:var(--serif); font-weight:700; color:var(--dark); text-decoration:none; }
.item-title:hover { color:var(--red); }
.item-meta { color:var(--light); font-size:.76rem; margin-top:4px; }
.state { background:var(--white); border:1px solid var(--rule); border-radius:4px; color:var(--mid); padding:24px; }
.error { color:var(--red); }
@media (max-width:760px) { .grid { grid-template-columns:1fr; } .panel.full { grid-column:auto; } .header-inner { flex-direction:column; align-items:flex-start; gap:12px; } }
</style>
<link rel="stylesheet" href="/theme.css">
</head>
<body>
<header>
  <div class="header-inner">
    <a class="logo" href="/search">Common<span>Source</span></a>
    <div class="nav"><a href="/search">Archive</a></div>
  </div>
</header>
<main id="app"><div class="state">Loading publisher...</div></main>
<script>
const API = window.location.protocol === 'file:' ? 'http://localhost:5050' : '';
function escHtml(value) { return String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function publisherIdFromPath() {
  const match = window.location.pathname.match(/\/publisher\/(.+)$/);
  return match ? decodeURIComponent(match[1]) : '';
}
function renderDocs(items) {
  if (!items?.length) return '<div class="item-meta">No public documents found yet.</div>';
  return items.map(item => `
    <div class="item">
      <a class="item-title" href="/document/${encodeURIComponent(item.document_id)}">${escHtml(item.title || 'Untitled')}</a>
      <div class="item-meta">${escHtml(item.category || item.document_type || item.source || 'Archive document')}</div>
    </div>
  `).join('');
}
function renderPublisher(data) {
  const profile = data.profile || {};
  const publisher = data.publisher || {};
  const name = profile.organization_name || publisher.name || data.publication || 'Publisher';
  document.title = `${name} - CommonSource`;
  document.getElementById('app').innerHTML = `
    <section class="profile">
      <div class="eyebrow">${escHtml(profile.verification_status || publisher.status || 'publisher')}</div>
      <h1>${escHtml(name)}</h1>
      <p class="description">${escHtml(profile.description || 'CommonSource publisher profile.')}</p>
      <div class="meta">
        ${profile.website ? `<a class="pill" href="${escHtml(profile.website)}" target="_blank" rel="noopener">Website</a>` : ''}
        ${profile.coverage_regions ? `<span class="pill">${escHtml(profile.coverage_regions)}</span>` : ''}
        ${profile.languages ? `<span class="pill">${escHtml(profile.languages)}</span>` : ''}
        ${profile.topics ? `<span class="pill">${escHtml(profile.topics)}</span>` : ''}
      </div>
    </section>
    <div class="grid">
      <section class="panel"><h2>Documents</h2><div class="stat"><strong>${escHtml(data.document_count || 0)}</strong><span>Uploaded</span></div></section>
      <section class="panel"><h2>Reader Activity</h2><div class="stat"><strong>${escHtml(data.total_views || 0)}</strong><span>Total Views</span></div></section>
      <section class="panel full"><h2>Recent Documents</h2>${renderDocs(data.recent_documents || [])}</section>
    </div>`;
}
async function loadPublisher() {
  const publisherId = publisherIdFromPath();
  try {
    const res = await fetch(`${API}/api/publisher/${encodeURIComponent(publisherId)}`);
    const data = await res.json().catch(() => ({}));
    if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
    renderPublisher(data);
  } catch (err) {
    document.getElementById('app').innerHTML = `<div class="state error">${escHtml(err.message || 'Could not load publisher')}</div>`;
  }
}
loadPublisher();
</script>
</body>
</html>
